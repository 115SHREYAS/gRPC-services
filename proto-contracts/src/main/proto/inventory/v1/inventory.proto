syntax = "proto3";

package demo.inventory.v1;

option java_multiple_files = true;
option java_package = "com.example.grpc.contract.inventory.v1";
option java_outer_classname = "InventoryProto";

import "common/v1/common.proto";

message WarehouseAvailabilityRequest {
  string correlation_id = 1;
  repeated demo.common.v1.CartItem items = 2;
}

message WarehouseAvailabilitySnapshot {
  string warehouse_code = 1;
  string sku = 2;
  int32 available_quantity = 3;
  int32 suggested_reserve_quantity = 4;
  string eta = 5;
}

message InventoryReservationRequest {
  string correlation_id = 1;
  string order_id = 2;
  repeated demo.common.v1.CartItem items = 3;
}

message ReservationLine {
  string sku = 1;
  int32 requested_quantity = 2;
  int32 reserved_quantity = 3;
  string warehouse_code = 4;
}

message InventoryReservationResponse {
  string reservation_id = 1;
  repeated ReservationLine lines = 2;
  bool fulfilled = 3;
  string status_message = 4;
}

service InventoryService {
  rpc StreamWarehouseAvailability(WarehouseAvailabilityRequest) returns (stream WarehouseAvailabilitySnapshot);
  rpc ReserveInventory(InventoryReservationRequest) returns (InventoryReservationResponse);
}
