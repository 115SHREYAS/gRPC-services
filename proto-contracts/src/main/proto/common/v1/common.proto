syntax = "proto3";

package demo.common.v1;

option java_multiple_files = true;
option java_package = "com.example.grpc.contract.common.v1";
option java_outer_classname = "CommonProto";

message Money {
  string currency = 1;
  int64 units = 2;
  int32 nanos = 3;
}

message Customer {
  string customer_id = 1;
  string email = 2;
  string tier = 3;
}

message Address {
  string line1 = 1;
  string line2 = 2;
  string city = 3;
  string state = 4;
  string postal_code = 5;
  string country_code = 6;
}

message CartItem {
  string sku = 1;
  string title = 2;
  int32 quantity = 3;
}
